name: Release

# Two ways to fire:
#   1. Tag-driven — push `vX.Y.Z` and the workflow packs and publishes.
#   2. Manual    — run from the Actions UI; the tag is derived from the
#      plugin header version (`vX.Y.Z`), so the workflow stays idempotent
#      with the tag-driven path.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Don't let two releases for the same ref step on each other. We do NOT
# cancel an in-flight release — letting it finish is safer than killing
# it half-way through `gh release upload`.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Needs `contents: write` to create/update GitHub Releases via the
# auto-provided `GITHUB_TOKEN`. Everything else stays read-only.
permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    # Skip restoring dev Composer deps inside `bin/pack.sh` — the CI
    # runner is thrown away immediately afterwards.
    env:
      D404_PACK_SKIP_RESTORE: '1'

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog step can diff against
          # the previous `v*` tag with `git log <prev>..<tag>`.
          fetch-depth: 0

      # PHP 7.4 matches the plugin's declared floor (`Requires PHP`).
      # `tools: composer:v2, wp-cli` gives `composer` and `wp` in one
      # step — `wp i18n make-pot` inside `pack.sh` needs WP-CLI.
      - name: Set up PHP and WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer:v2, wp-cli

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Install npm dependencies
        run: npm ci

      # Tag-driven runs: use the pushed tag.
      # Dispatch runs:   derive `v<version>` from the plugin header.
      # Either way, verify the header matches so we never publish a ZIP
      # with mismatched metadata.
      - name: Resolve release tag
        id: version
        run: |
          set -euo pipefail

          plugin_version=$(grep -E '^[[:space:]]*\*?[[:space:]]*Version:' 404-to-301.php \
            | head -1 | sed -E 's/.*Version:[[:space:]]*//' | tr -d '\r')

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${{ github.ref_name }}"
          else
            tag="v${plugin_version}"
          fi

          if [[ "${tag#v}" != "${plugin_version}" ]]; then
            echo "::error::Tag '${tag}' does not match plugin header version '${plugin_version}'."
            exit 1
          fi

          echo "tag=${tag}"                 >> "$GITHUB_OUTPUT"
          echo "version=${plugin_version}"  >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${tag}"

      - name: Pack plugin
        run: npm run pack

      # Build the release notes from `git log <prev-tag>..<tag>`.
      # Subject-only bullet list with a linked commit SHA — clicking the
      # SHA on the release page surfaces the full commit body, so long
      # explanations don't bloat the release notes.
      #
      # Falls back to the entire history if no prior tag exists (first
      # release on a new repo).
      - name: Build changelog
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          # Make sure we have all tags — actions/checkout shallow-clones
          # by default, which would hide the previous release tag.
          git fetch --tags --force --quiet

          prev_tag=$(git tag --list 'v*' --sort=-v:refname \
            | grep -v "^${TAG}$" \
            | head -n1 || true)

          repo_url="${{ github.server_url }}/${{ github.repository }}"

          if [[ -n "$prev_tag" ]]; then
            echo "Diffing against previous tag: $prev_tag"
            range="${prev_tag}..${TAG}"
            header="## What's changed since ${prev_tag}"
          else
            echo "No previous tag — listing entire history."
            range="${TAG}"
            header="## What's changed"
          fi

          notes_file="$(mktemp)"
          {
            echo "$header"
            echo
            # Skip "Bump version …" commits — they're release plumbing,
            # not changelog content.
            git log "$range" --no-merges --reverse \
              --pretty=format:"- %s ([\`%h\`](${repo_url}/commit/%H))" \
              | grep -Ev '^- Bump version '
            echo
            echo
            if [[ -n "$prev_tag" ]]; then
              echo "**Full diff:** [${prev_tag}...${TAG}](${repo_url}/compare/${prev_tag}...${TAG})"
            fi
          } > "$notes_file"

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat "$notes_file"
          echo "-------------------------"

      # `gh release view` returns non-zero when the release is missing,
      # so the `||` branch handles the "create" path and the success
      # branch handles "update existing" with `--clobber`.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN:   ${{ github.token }}
          TAG:        ${{ steps.version.outputs.tag }}
          VERSION:    ${{ steps.version.outputs.version }}
          NOTES_FILE: ${{ steps.changelog.outputs.notes_file }}
        run: |
          set -euo pipefail

          zip="releases/404-to-301-${VERSION}.zip"

          if [[ ! -f "$zip" ]]; then
            echo "::error::Expected ZIP not found at ${zip}."
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} exists — replacing the ZIP asset and refreshing notes."
            gh release upload "$TAG" "$zip" --clobber
            gh release edit   "$TAG" --notes-file "$NOTES_FILE"
          else
            echo "Creating release ${TAG}."
            gh release create "$TAG" "$zip" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          fi
